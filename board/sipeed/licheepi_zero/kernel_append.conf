# USB Gadget configfs support
CONFIG_CONFIGFS_FS=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_F_FS=y
CONFIG_USB_CONFIGFS_ACM=y

# MUSB Debug support - enables tracepoints (musb_log, musb_isr,
# musb_readb/w, musb_writeb/w, musb_urb_*, musb_req_*, musb_state)
# Runtime: echo 1 > /sys/kernel/debug/tracing/events/musb/enable
CONFIG_FTRACE=y
CONFIG_TRACING=y
CONFIG_DYNAMIC_DEBUG=y

# Optional: USB core debug
# CONFIG_USB_DEBUG=y